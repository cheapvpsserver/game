    .nav-menu {

    .nav-actions {
      display: flex;
      gap: 16px;
    }

    /* 头部样式 */
    header {
      padding: 40px 0;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .download-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    /* 按钮基础样式 */
    .btn {
      padding: 10px 24px;
      border-radius: 24px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      outline: none;

    /* 按钮图标样式 */
    .btn i {
      margin-right: 8px;

    .btn-outline {

    .hero-screenshot {

      border-radius: 12px;

      overflow: hidden;
      background-color: #f0f0f0;

    /* 视频容器相对定位 */
    .video-container {
      position: relative;
      cursor: pointer;
    }
    
    /* 视频覆盖层 */
    .video-overlay {

      top: 0;
      left: 0;

    /* 隐藏覆盖层 */

    /* 下载模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);

      position: relative;

        transform: translateY(-20px);
      }
      to {

        transform: translateY(0);
      }

    /* 轮播图样式 */
    .carousel-section {
      margin: 40px 0 0 0;
    }
    
    .carousel-container {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);

    .carousel-item {
      position: relative;

    .carousel-img {

      display: block;

    .slick-list {

    .slick-track {

    .slick-slide {

    /* 轮播图分页指示器样式 */

    /* 轮播图文字内容样式 */
    .carousel-content {
      position: absolute !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      text-align: center !important;
      color: white !important;
      padding: 30px !important;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent) !important;

      transform: translateY(0) !important;

      display: flex !important;

      align-items: center !important;

    /* 确保轮播项是相对定位的，以便绝对定位的内容能够正确定位 */
    .carousel-item {
      position: relative !important;
      height: 100% !important;
      overflow: hidden !important;
    }
    
    /* 确保Slick.js不会影响内容定位 */
    .slick-slide {
      position: relative !important;

    /* 确保轮播图容器的高度被正确应用 */
    .carousel-container {

    /* 游戏板块样式 */
    .games-section {

    .games-grid {
      display: grid;

    .game-card {
      background-color: white;

    .game-card:hover {

    .game-card-img {
      height: 200px;
      overflow: hidden;
    }
    
    .game-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    
    .game-card:hover .game-card-img img {
      transform: scale(1.05);
    }
    
    .game-card-info {
      padding: 15px;
    }
    
    .game-card-info h3 {
      font-size: 16px;
      font-weight: 600;

      color: #1a1a1a;
    }
    
    .game-card-category {
      font-size: 14px;
      color: #666;

    }
    
    .game-card-rating {
      font-size: 14px;

      font-weight: 500;

    /* 响应式适配 */
    @media (max-width: 1200px) {
      .carousel-section {
        margin: 20px 0 0 0;
      }
      
      .carousel-container {
        height: 400px !important;
      }
      
      .carousel-item {
        height: 100% !important;
      }
      
      .carousel-content h2 {

      }

    @media (max-width: 992px) {
      .games-grid {
        grid-template-columns: repeat(3, 1fr);

      .carousel-section {

      }
      
      .carousel-container {

      }
      
      .carousel-item {
        height: 100% !important;
      }
      
      .carousel-content h2 {

    }

    @media (max-width: 768px) {
      .nav-menu {
        display: none;
      }
      
      .carousel-section {
        margin: 40px 0 0 0;
      }
      
      .carousel-container {

      }
      
      .carousel-item {

      }
      
      .carousel-content {
        padding: 15px;
      }
      
      .carousel-content h2 {
        font-size: 24px;
      }
      
      .carousel-content p {
        font-size: 16px;
      }
      
      .games-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .section-title {
        font-size: 24px;
      }
    }

    @media (max-width: 480px) {
      .carousel-section {
        margin: 30px 0 0 0;
      }
      
      .carousel-container {
        height: 250px !important;
      }
      
      .carousel-item {
        height: 100% !important;
      }
      
      .carousel-content {
        padding: 12px;
      }
      
      .carousel-content h2 {
        font-size: 20px;
      }
      
      .carousel-content p {
        font-size: 14px;
        margin-bottom: 10px;
      }
      
      .carousel-content .btn {
        padding: 8px 16px;
        font-size: 12px;
      }
      
      .games-grid {
        grid-template-columns: 1fr;
      }
      
      .game-img {

  </style>

<body>
  <!-- 导航栏将通过JavaScript动态加载 -->
  <div id="header-container"></div>

  <!-- 右侧功能按钮将通过JavaScript动态加载 -->

  <div class="container">
    <!-- 轮播图区域 -->
    <section class="carousel-section">
      <div class="carousel-container">
        <div class="carousel">
          <div class="carousel-item">
            <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=game%20banner%20with%20action%20game%20scene%20colorful%20vibrant%20high%20quality&image_size=landscape_16_9" alt="游戏轮播图1" class="carousel-img">

            </div>
          </div>
          <div class="carousel-item">

            <div class="carousel-content">

      <div class="games-grid">

      </div>
    </section>

    <!-- 最新游戏板块 -->
    <section class="games-section latest-games">
      <h2 class="section-title">最新游戏</h2>
      <div class="games-grid">
        <!-- 数据将通过JavaScript动态加载 -->
      </div>
    </section>

    <!-- 页脚将通过JavaScript动态加载 -->
    <div id="footer-container"></div>
  </div>



  <script>
    // 加载顶部导航栏
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        const headerContainer = document.getElementById('header-container');
        headerContainer.innerHTML = data;
        
        // 执行header.html中的JavaScript代码
        const scripts = headerContainer.querySelectorAll('script');
        scripts.forEach(script => {
          const newScript = document.createElement('script');
          if (script.src) {
            newScript.src = script.src;
          } else {
            newScript.textContent = script.textContent;
          }
          document.body.appendChild(newScript);
          document.body.removeChild(newScript);
        });
      })
      .catch(error => console.error('加载顶部导航栏失败:', error));

    // 加载底部页脚
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => console.error('加载底部页脚失败:', error));

    // 加载右侧功能按钮
    fetch('side-tools.html')
      .then(response => response.text())
      .then(data => {
        const sideToolsContainer = document.getElementById('side-tools-container');
        sideToolsContainer.innerHTML = data;
        
        // 执行side-tools.html中的JavaScript代码
        const scripts = sideToolsContainer.querySelectorAll('script');
        scripts.forEach(script => {
          const newScript = document.createElement('script');
          if (script.src) {
            newScript.src = script.src;
          } else {
            newScript.textContent = script.textContent;
          }
          document.body.appendChild(newScript);
          document.body.removeChild(newScript);
        });
      })
      .catch(error => console.error('加载右侧功能按钮失败:', error));

    // 添加平滑滚动效果
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href')).scrollIntoView({
          behavior: 'smooth'
        });
      });
    });

    // 添加图片懒加载
    if ('loading' in HTMLImageElement.prototype) {
      document.querySelectorAll('img').forEach(img => {
        img.loading = 'lazy';
      });
    } else {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/lazysizes/5.3.2/lazysizes.min.js';
