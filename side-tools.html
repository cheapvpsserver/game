<!-- 右侧功能按钮 -->
<div class="side-tools">
  <!-- 回到顶部按钮 -->
  <button class="side-btn" id="back-to-top" title="回到顶部">
    <i class="fas fa-arrow-up"></i>
  </button>
  <!-- 搜索按钮 -->
  <button class="side-btn" id="search-btn" title="搜索">
    <i class="fas fa-search"></i>
  </button>
</div>

<!-- 搜索模态框 -->
<div id="search-modal" class="modal">
  <div class="modal-content" style="max-width: 600px;">
    <span class="close-btn">&times;</span>
    <h3>搜索游戏</h3>
    <div class="search-container">
      <input type="text" id="search-input" placeholder="输入游戏名称或关键词" class="search-input">
      <button id="search-submit" class="btn btn-blue">搜索</button>
    </div>
    <div id="search-results" class="search-results">
      <!-- 搜索结果将在这里显示 -->
    </div>
  </div>
</div>

<style>
  /* 右侧功能按钮样式 */
  .side-tools {
    position: fixed;
    right: 250px;
    bottom: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 99;
  }
  
  /* 移动端适配 */
  @media (max-width: 1200px) {
    .side-tools {
      right: 30px;
      bottom: 30px;
    }
  }
  
  /* 右侧功能按钮 */
  .side-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background-color: #4683f4;
    border: none;
    box-shadow: 0 2px 12px rgba(70, 131, 244, 0.3);
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    text-align: center;
  }
  
  /* 搜索按钮始终显示 */
  #search-btn {
    opacity: 1;
    visibility: visible;
  }
  
  .side-btn:hover {
    background-color: #3366cc;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(51, 102, 204, 0.4);
  }
  
  .side-btn.show {
    opacity: 1;
    visibility: visible;
  }
  
  /* 右侧按钮焦点样式 */
  .side-btn:focus {
    outline: none;
  }

  /* 搜索容器样式 */
  .search-container {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  /* 搜索输入框样式 */
  .search-input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #e0e0e0;
    border-radius: 24px;
    font-size: 16px;
    transition: all 0.3s ease;
  }

  .search-input:focus {
    outline: none;
    border-color: #4683f4;
    box-shadow: 0 0 0 3px rgba(70, 131, 244, 0.1);
  }

  /* 搜索结果样式 */
  .search-results {
    margin-top: 20px;
    max-height: 300px;
    overflow-y: auto;
  }

  /* 搜索结果项样式 */
  .search-result-item {
    display: flex;
    align-items: center;
    padding: 12px;
    background-color: #f8f9fa;
    border-radius: 8px;
    margin-bottom: 10px;
    transition: background-color 0.3s ease;
  }

  .search-result-item:hover {
    background-color: #e9ecef;
  }

  /* 搜索结果图片样式 */
  .search-result-img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    margin-right: 12px;
  }

  /* 搜索结果信息样式 */
  .search-result-info {
    flex: 1;
  }

  .search-result-info h4 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #333;
  }

  .search-result-info p {
    font-size: 14px;
    color: #666;
    margin: 0;
  }

  /* 无结果提示样式 */
  .no-results {
    text-align: center;
    padding: 20px;
    color: #666;
    font-size: 16px;
  }

  /* 模态框样式 */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(3px);
  }

  /* 模态框内容 */
  .modal-content {
    background-color: white;
    margin: 15% auto;
    padding: 30px;
    border: none;
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    animation: modalFadeIn 0.3s ease;
    position: relative;
  }

  /* 模态框动画 */
  @keyframes modalFadeIn {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* 关闭按钮 */
  .close-btn {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.3s ease;
    position: absolute;
    top: 15px;
    right: 20px;
    outline: none;
  }

  .close-btn:hover {
    color: #333;
  }

  /* 模态框标题 */
  .modal-content h3 {
    margin-top: 0;
    margin-bottom: 25px;
    font-size: 20px;
    color: #333;
    text-align: center;
    outline: none;
  }
  
  /* 搜索按钮和输入框焦点样式 */
  #search-submit {
    border: none !important;
  }
  
  #search-submit:focus,
  #search-submit:hover {
    outline: none !important;
    box-shadow: 0 0 0 3px rgba(70, 131, 244, 0.1) !important;
    border: 1px solid #4683f4 !important;
  }
  
  /* 搜索输入框焦点样式 - 保持蓝色边框效果 */
  #search-input:focus {
    outline: none;
    border-color: #4683f4;
    box-shadow: 0 0 0 3px rgba(70, 131, 244, 0.1);
  }
</style>

<script>
  // 回到顶部功能
  (function() {
    const backToTopBtn = document.getElementById('back-to-top');
    
    if (backToTopBtn) {
      // 监听滚动事件
      window.addEventListener('scroll', function() {
        if (window.pageYOffset > 300) {
          backToTopBtn.classList.add('show');
        } else {
          backToTopBtn.classList.remove('show');
        }
      });
      
      // 点击回到顶部
      backToTopBtn.addEventListener('click', function() {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });
    }
  })();

  // 搜索功能
  (function() {
    const searchBtn = document.getElementById('search-btn');
    const searchModal = document.getElementById('search-modal');
    const closeBtn = searchModal.querySelector('.close-btn');
    const searchInput = document.getElementById('search-input');
    const searchSubmit = document.getElementById('search-submit');
    const searchResults = document.getElementById('search-results');
    
    // 打开搜索模态框
    if (searchBtn) {
      searchBtn.addEventListener('click', function() {
        searchModal.style.display = 'block';
        searchInput.focus();
      });
    }
    
    // 关闭搜索模态框
    if (closeBtn) {
      closeBtn.addEventListener('click', function() {
        searchModal.style.display = 'none';
        searchInput.value = '';
        searchResults.innerHTML = '';
      });
    }
    
    // 点击模态框外部关闭
    window.addEventListener('click', function(event) {
      if (event.target === searchModal) {
        searchModal.style.display = 'none';
        searchInput.value = '';
        searchResults.innerHTML = '';
      }
    });
    
    // 执行搜索
    function performSearch() {
      const query = searchInput.value.toLowerCase().trim();
      searchResults.innerHTML = '<div class="no-results">搜索中...</div>';
      
      if (query === '') {
        searchResults.innerHTML = '<div class="no-results">请输入搜索关键词</div>';
        return;
      }
      
      // 使用game-data.js中的searchGames函数搜索
      if (typeof searchGames === 'function') {
        searchGames(query)
          .then(filteredGames => {
            // 显示搜索结果
            if (filteredGames.length === 0) {
              searchResults.innerHTML = '<div class="no-results">没有找到相关游戏</div>';
            } else {
              searchResults.innerHTML = '';
              filteredGames.forEach(game => {
                const resultItem = document.createElement('div');
                resultItem.className = 'search-result-item';
                resultItem.innerHTML = `
                  <img src="${game.image}" alt="${game.name}" class="search-result-img">
                  <div class="search-result-info">
                    <h4>${game.name}</h4>
                    <p>${game.category} | ★★★★★ ${game.rating}</p>
                  </div>
                `;
                searchResults.appendChild(resultItem);
              });
            }
          })
          .catch(error => {
            console.error('搜索失败:', error);
            searchResults.innerHTML = '<div class="no-results">搜索失败，请重试</div>';
          });
      } else {
        searchResults.innerHTML = '<div class="no-results">搜索功能未加载</div>';
      }
    }
    
    // 搜索按钮点击事件
    if (searchSubmit) {
      searchSubmit.addEventListener('click', performSearch);
    }
    
    // 输入框回车事件
    if (searchInput) {
      searchInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
          performSearch();
        }
      });
    }
    

  })();
</script>
